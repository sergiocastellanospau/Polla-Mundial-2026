<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Polla 2026">
<meta name="theme-color" content="#0D1B2A">
<title>Polla Mundial 2026</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0D1B2A;--navy2:#152238;--navy3:#1E3352;
  --gold:#C9A843;--gold2:#F0C866;--gold3:#FBE8A6;
  --red:#E8365D;--green:#16A34A;--off:#F5F3EE;
  --text:#1A1A2E;--muted:#6B7280;--faint:#9CA3AF;
  --border:#E5E2DA;--card:#FFFFFF;--card2:#F9F8F5;
  --green-bg:#F0FDF4;--green-border:#BBF7D0;--green-text:#15803D;
  --blue-bg:#EFF6FF;--blue-border:#BFDBFE;--blue-text:#1D4ED8;
  --amber-bg:#FFFBEB;--amber-border:#FDE68A;--amber-text:#92400E;
  --red-bg:#FFF1F2;--red-border:#FECDD3;--red-text:#BE123C;
  --r:12px;--r-sm:8px;--r-lg:16px;
  --sh:0 1px 4px rgba(13,27,42,.07);--sh-md:0 4px 16px rgba(13,27,42,.11);
  --fd:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--off);color:var(--text);min-height:100vh;padding-bottom:calc(60px + var(--safe-bot))}
button,input,select,textarea{font-family:var(--fb)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

.topnav{background:var(--navy);position:sticky;top:0;z-index:90;padding-top:var(--safe-top);box-shadow:0 2px 12px rgba(0,0,0,.3)}
.topnav-inner{max-width:1360px;margin:0 auto;display:flex;align-items:center;padding:0 16px;gap:12px;height:52px}
.brand-name{font-family:var(--fd);font-size:19px;color:var(--gold);letter-spacing:.04em;line-height:1}
.brand-sub{font-size:9px;color:rgba(240,200,102,.5);letter-spacing:.06em}
.nav-scr{display:flex;overflow-x:auto;gap:2px;flex:1;scrollbar-width:none;padding:2px 0}
.nav-scr::-webkit-scrollbar{display:none}
.nb{flex-shrink:0;padding:9px 13px;font-size:12px;font-weight:500;color:rgba(255,255,255,.45);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.03em;transition:all .15s;white-space:nowrap}
.nb.on{color:var(--gold);border-bottom-color:var(--gold)}
.nb:hover{color:rgba(255,255,255,.8)}
.adot{display:inline-block;width:6px;height:6px;background:var(--red);border-radius:50%;margin-left:4px;vertical-align:middle}

.botnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:91;
  background:var(--navy);border-top:1px solid rgba(255,255,255,.12);
  padding-bottom:var(--safe-bot);box-shadow:0 -4px 20px rgba(0,0,0,.3)}
@media(max-width:600px){.botnav{display:flex}.topnav .nav-scr{display:none}}
body{padding-bottom:calc(72px + var(--safe-bot))}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 2px 8px;border:none;background:none;cursor:pointer;
  color:rgba(255,255,255,.38);transition:all .15s;position:relative;min-width:0}
.bn-btn.on{color:var(--gold)}
.bn-btn.on::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;
  background:var(--gold);border-radius:0 0 3px 3px}
.bn-btn:active{transform:scale(.93)}
.bn-emoji{font-size:22px;line-height:1;transition:transform .15s}
.bn-btn.on .bn-emoji{transform:scale(1.12)}
.bn-label{font-size:9px;font-weight:600;letter-spacing:.04em;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center}

.main{max-width:1360px;margin:0 auto;padding:16px}
.panel{display:none}.panel.on{display:block}

.hero{background:var(--navy);border-radius:var(--r-lg);padding:22px 20px;margin-bottom:16px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(201,168,67,.13),transparent 70%);pointer-events:none}
.hero-ey{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--gold);opacity:.7;text-transform:uppercase;margin-bottom:4px}
.hero-t{font-family:var(--fd);font-size:clamp(24px,5vw,40px);color:var(--gold);line-height:1;margin-bottom:4px;letter-spacing:.03em}
.hero-s{font-size:12px;color:rgba(240,200,102,.55);margin-bottom:14px}
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.hs{text-align:center}
.hs-v{font-family:var(--fd);font-size:24px;color:var(--gold2);letter-spacing:.02em;line-height:1}
.hs-l{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.hero-dead{margin-top:12px;background:rgba(232,54,93,.12);border:1px solid rgba(232,54,93,.25);border-radius:var(--r-sm);padding:8px 12px;font-size:11px;color:#FF9BAD}
.hero-dead strong{color:#FF7090}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.card-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;color:var(--text)}
.card-title i{font-size:18px;color:var(--muted)}

.rank-list{display:flex;flex-direction:column;gap:7px}
.rr{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh);transition:box-shadow .15s}
.rr:hover{box-shadow:var(--sh-md)}
.rr-num{font-family:var(--fd);font-size:20px;min-width:26px;color:var(--faint);line-height:1}
.rr-num.g{color:#C9A843}.rr-num.s{color:#9CA3AF}.rr-num.b{color:#B45309}
.rr-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:15px;color:#fff;flex-shrink:0}
.rr-info{flex:1;min-width:0}
.rr-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rr-meta{font-size:11px;color:var(--muted);margin-top:1px}
.rr-bar{height:3px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden}
.rr-fill{height:3px;border-radius:2px;background:var(--navy3);transition:width .4s}
.rr-pts{text-align:right;flex-shrink:0}
.rr-pv{font-family:var(--fd);font-size:24px;color:var(--navy);line-height:1}
.rr-pl{font-size:10px;color:var(--faint)}

.filter-strip{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;margin-bottom:12px;scrollbar-width:none}
.filter-strip::-webkit-scrollbar{display:none}
.fp{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;background:var(--card);color:var(--muted);transition:all .15s}
.fp.on{background:var(--navy);color:var(--gold);border-color:var(--navy)}
.search-box{width:100%;padding:9px 15px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;background:var(--card);color:var(--text);outline:none;margin-bottom:11px}
.search-box:focus{border-color:var(--gold)}

.phase-sep{display:flex;align-items:center;gap:10px;margin:18px 0 8px}
.phase-line{flex:1;height:1px;background:var(--border)}
.phase-badge{font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--muted);padding:4px 12px;background:var(--card);border:1px solid var(--border);border-radius:20px;white-space:nowrap;text-transform:uppercase}

.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--sh)}
.mc-top{display:flex;align-items:center;gap:7px;padding:8px 13px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.mc-num{font-size:10px;font-weight:700;color:var(--blue-text);background:var(--blue-bg);border:1px solid var(--blue-border);padding:2px 7px;border-radius:4px}
.mc-date{font-size:10px;color:var(--muted);font-weight:500}
.mc-venue{font-size:10px;color:var(--faint);margin-left:auto;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-done{font-size:9px;font-weight:700;color:var(--green-text);background:var(--green-bg);border:1px solid var(--green-border);padding:2px 6px;border-radius:4px;flex-shrink:0}
.mc-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:11px 13px}
.mc-team{display:flex;flex-direction:column;align-items:center;gap:3px;text-align:center;min-width:0}
.mc-team.home{flex-direction:column-reverse}
.mc-flag{font-size:28px;line-height:1}
@media(max-width:380px){.mc-flag{font-size:22px}}
.mc-tname{font-size:12px;font-weight:700;max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-ctr{display:flex;flex-direction:column;align-items:center;gap:3px}
.mc-scores{display:flex;gap:4px;align-items:center}
.sc-inp{width:40px;height:40px;text-align:center;font-size:17px;font-weight:700;border-radius:var(--r-sm);border:2px solid var(--blue-border);background:var(--blue-bg);color:var(--navy);outline:none}
.sc-inp:focus{border-color:var(--navy3);box-shadow:0 0 0 3px rgba(30,51,82,.1)}
@media(max-width:380px){.sc-inp{width:34px;height:34px;font-size:15px}}
.sc-sep{font-size:18px;font-weight:700;color:var(--border)}
.mc-vs{font-size:9px;color:var(--faint);letter-spacing:.07em}

.mc-preds{background:var(--card2);border-top:1px solid var(--border);padding:9px 13px}
.mc-preds-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-bottom:7px}
.preds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:5px}
@media(max-width:440px){.preds-grid{grid-template-columns:1fr 1fr}}
.pi{display:flex;align-items:center;gap:5px;min-width:0}
.pi-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;color:#fff}
.pi-nm{font-size:9.5px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.pi-inps{display:flex;gap:2px;align-items:center;flex-shrink:0}
.pi-inp{width:27px;height:25px;text-align:center;font-size:12px;font-weight:700;border-radius:5px;border:1px solid var(--amber-border);background:var(--amber-bg);color:var(--navy);outline:none}
.pi-inp:focus{border-color:var(--gold)}
.ptag{font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;min-width:22px;text-align:center}
.pt-n{background:var(--off);color:var(--faint)}
.pt-0{background:var(--red-bg);color:var(--red-text)}
.pt-3{background:var(--blue-bg);color:var(--blue-text)}
.pt-5{background:var(--green-bg);color:var(--green-text)}
.pt-7{background:var(--amber-bg);color:var(--amber-text)}
.pt-10{background:#FDF2F8;color:#831843}

.bk-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.bk-board{display:flex;gap:0;min-width:880px;align-items:center}
.bk-col{display:flex;flex-direction:column;flex:1;padding:0 3px;min-width:0}
.bk-col-hdr{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:center;padding:5px 0 8px}
.bk-col-ms{display:flex;flex-direction:column;flex:1;justify-content:space-around}
.bk-m{margin:3px 0;cursor:pointer;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--border);box-shadow:var(--sh);transition:box-shadow .15s}
.bk-m:hover{box-shadow:var(--sh-md)}
.bk-mi{font-size:7px;font-weight:700;color:var(--faint);text-align:center;padding:3px 5px;background:var(--card2);border-bottom:1px solid var(--border);letter-spacing:.04em}
.bk-t{display:flex;align-items:center;gap:4px;padding:5px 7px;background:var(--card);height:28px;min-width:0}
.bk-t+.bk-t{border-top:1px solid var(--border)}
.bk-t.win{background:var(--blue-bg)}
.bk-t.tbd{background:var(--card2)}
.bk-tf{font-size:12px;flex-shrink:0;width:17px;text-align:center}
.bk-tn{font-size:9px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bk-tn.tbd{color:var(--faint);font-weight:400}
.bk-ts{font-size:9px;font-weight:700;color:var(--navy3);min-width:11px;text-align:right}
.bk-center{flex:0 0 148px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:0 5px}
.fin-tile{width:100%;background:var(--navy);border:2px solid rgba(201,168,67,.5);border-radius:var(--r);padding:12px 10px;text-align:center;cursor:pointer}
.fin-tile:hover{opacity:.9}
.fin-trophy{font-size:26px;margin-bottom:3px}
.fin-lbl{font-family:var(--fd);font-size:15px;color:var(--gold);letter-spacing:.04em;margin-bottom:1px}
.fin-date{font-size:9px;color:rgba(240,200,102,.4);margin-bottom:8px}
.fin-tr{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.07);border-radius:5px;padding:5px 8px;margin:2px 0}
.fin-tr.champ{background:rgba(201,168,67,.18);border:1px solid rgba(201,168,67,.3)}
.ftf{font-size:14px}.ftn{font-size:10px;font-weight:600;color:rgba(240,200,102,.8);flex:1}
.crown{font-size:11px}.fin-vs{font-size:9px;color:rgba(255,255,255,.2);text-align:center;margin:1px 0}
.fin-tbd{color:rgba(255,255,255,.2);font-size:10px;padding:5px;text-align:center}
.third-tile{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 10px;text-align:center;cursor:pointer}
.third-lbl{font-size:8px;font-weight:700;letter-spacing:.07em;color:var(--muted);text-transform:uppercase;margin-bottom:4px}

.plist{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:7px}
.pchip{display:flex;align-items:center;gap:9px;background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 11px}
.pchip-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:15px;color:#fff;flex-shrink:0}
.pchip-info{flex:1;min-width:0}
.pchip-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pchip-paid{font-size:10px;margin-top:1px}
.pchip-paid.yes{color:var(--green-text)}.pchip-paid.no{color:var(--red-text)}
.pchip-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--faint);transition:all .12s;font-size:14px}
.icon-btn:hover{background:var(--off)}
.icon-btn.danger:hover{background:var(--red-bg);color:var(--red-text);border-color:var(--red-border)}
.icon-btn.success:hover{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border)}
.icon-btn.warn:hover{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber-border)}

.p-select{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.p-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;background:var(--card);color:var(--text);transition:all .15s;flex-shrink:0}
.p-btn.on{background:var(--navy);color:var(--gold);border-color:var(--navy)}
.p-btn .pav{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:10px;color:#fff;flex-shrink:0}
.p-hero{background:var(--navy);border-radius:var(--r-lg);padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.p-hero-av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:20px;color:#fff;flex-shrink:0}
.p-hero-name{font-family:var(--fd);font-size:20px;color:var(--gold);letter-spacing:.03em}
.p-hero-meta{font-size:11px;color:rgba(240,200,102,.55);margin-top:2px}
.p-hero-pts{font-family:var(--fd);font-size:36px;color:var(--gold2);line-height:1;margin-left:auto}
.p-hero-pl{font-size:9px;color:rgba(240,200,102,.45);text-align:right;letter-spacing:.06em}
.p-tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.p-tbl{width:100%;border-collapse:collapse;min-width:380px;background:var(--card);border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.p-tbl th{background:var(--navy);color:rgba(255,255,255,.7);font-size:10px;font-weight:700;padding:9px 11px;text-align:left;letter-spacing:.04em;white-space:nowrap}
.p-tbl td{padding:8px 11px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle}
.p-tbl tr:last-child td{border-bottom:none}
.p-tbl tr:hover td{background:var(--card2)}
.tc{text-align:center}

.prizes-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.prize-card{background:var(--navy);border-radius:var(--r);padding:16px;text-align:center;position:relative;overflow:hidden}
.prize-card::before{content:'';position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:120px;height:120px;background:radial-gradient(circle,rgba(201,168,67,.1),transparent 70%)}
.pz-emoji{font-size:28px;margin-bottom:6px}
.pz-place{font-size:10px;font-weight:700;letter-spacing:.07em;color:rgba(240,200,102,.55);text-transform:uppercase;margin-bottom:3px}
.pz-amount{font-family:var(--fd);font-size:32px;color:var(--gold);letter-spacing:.02em}
.rules-tbl{width:100%;border-collapse:collapse;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.rules-tbl th{background:var(--navy);color:var(--gold);font-size:10px;font-weight:700;padding:9px 14px;letter-spacing:.05em;text-align:left}
.rules-tbl td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);background:var(--card)}
.rules-tbl tr:last-child td{border-bottom:none}

.adm-section{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.adm-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.adm-lbl{font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-bottom:5px;display:block}
.inp{padding:9px 13px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;color:var(--text);background:var(--off);outline:none;transition:border-color .15s;width:100%}
.inp:focus{border-color:var(--gold);background:#fff}
.btn{padding:9px 17px;border-radius:var(--r-sm);border:none;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn i{font-size:15px}
.btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover{background:var(--gold2)}
.btn-navy{background:var(--navy);color:var(--gold)}.btn-navy:hover{background:var(--navy2)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{background:var(--off)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#C42B4F}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#14803C}
.btn-sm{padding:6px 12px;font-size:12px}


.overlay{position:fixed;inset:0;background:rgba(13,27,42,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px);overflow-y:auto}
.modal{background:var(--card);border-radius:var(--r-lg);padding:22px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;position:relative}

// SCORING — Grupos: 3=resultado,5=exacto | KO: 3/5 normal + 7=empate+ganadorPen / 10=exacto+ganadorPen
function calcPts(rh,ra,ph,pa,isKO,rPenW,pPenW){
  if([rh,ra,ph,pa].some(x=>x===undefined||x===null||x===""))return null;
  rh=+rh;ra=+ra;ph=+ph;pa=+pa;
  const exact=(rh===ph&&ra===pa);
  const rr=rh>ra?"H":rh<ra?"A":"D", pr=ph>pa?"H":ph<pa?"A":"D";
  const rightRes=(rr===pr);
  if(!isKO){return exact?5:rightRes?3:0;}
  const draw=(rh===ra);
  if(!draw){return exact?5:rightRes?3:0;}
  // Draw in KO -> penales
  if(!rPenW||!pPenW)return exact?5:3;
  const rightPen=(rPenW===pPenW);
  return exact&&rightPen?10:rightPen?7:3;
}

function matchLocalTime(d, t){
  // d = "Jun 11", t = "15:00" (EST/EDT)
  try{
    const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    const [mon, day] = d.split(" ");
    const [hh, mm] = t.split(":");
    // EDT (UTC-4) during June-July
    const utcH = parseInt(hh) + 4;
    const dt = new Date(Date.UTC(2026, months[mon], parseInt(day), utcH, parseInt(mm)));
    const local = dt.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
    const tzShort = dt.toLocaleTimeString([],{timeZoneName:"short"}).split(" ").pop();
    const localDate = dt.toLocaleDateString([], {month:"short",day:"numeric"});
    return `${localDate} ${local} ${tzShort}`;
  }catch(e){ return `${d} ${t} EST`; }
}
function fmtDate(s){if(!s)return"por definir";const d=new Date(s+"T12:00:00");return d.toLocaleDateString("es",{day:"numeric",month:"long",year:"numeric"});}
function fmtMoney(n){
  // Format number according to selected currency locale
  const loc=S.currency?.locale||"en-US";
  const sym=S.currency?.symbol||"$";
  try{return sym+new Intl.NumberFormat(loc,{minimumFractionDigits:0,maximumFractionDigits:0}).format(Math.round(n));}
  catch(e){return sym+Math.round(n).toLocaleString();}
}

function totals(){
  return S.players.map((_,pi)=>{
    let t=0;
    // Group stage
    GM.forEach((_m,mi)=>{
      const r=S.real[String(mi)],p=S.pred[`${mi}_${pi}`];
      if(!r||!p)return;
      const v=calcPts(r.h,r.a,p.h,p.a,false);
      if(v!==null)t+=v;
    });
    // KO stage
    KO.forEach(({ms})=>ms.forEach(m=>{
      const r=S.ko[m.id],kp=S.koPred?.[m.id]?.[pi];
      if(!r||!r.hScore===undefined||r.aScore===undefined)return;
      if(!kp||kp.h===undefined||kp.a===undefined)return;
      const v=calcPts(r.hScore,r.aScore,kp.h,kp.a,true,r.winner,kp.penW);
      if(v!==null)t+=v;
    }));
    return t;
  });
}

function buildUpcomingWidget(){
  const EDT = 4; // EDT = UTC-4
  const MO = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  function kms(m){
    try{
      const [mo,d]=m.d.split(" ",[mon,day]);
      const [hh,mm]=m.t.split(":");
      return Date.UTC(2026,MO[m.d.split(" ")[0]],parseInt(m.d.split(" ")[1]),parseInt(hh)+EDT,parseInt(mm));
    }catch(e){return Infinity;}
  }
  const now = Date.now();
  const todayStr = new Date().toDateString();

  // Bucket each match
  const liveNow=[], todayBucket=[], futureBucket=[];
  GM.forEach((m,mi)=>{
    const r=S.real[String(mi)];
    const hasR=r&&r.h!==undefined&&r.a!==undefined;
    if(hasR) return; // skip played matches
    const k=kms(m);
    const isToday = new Date(k).toDateString()===todayStr;
    const inPlay  = now>=k-5*60*1000 && now<=k+115*60*1000;
    if(inPlay)          liveNow.push({m,mi,k});
    else if(isToday)    todayBucket.push({m,mi,k});
    else if(k>now)      futureBucket.push({m,mi,k});
  });
  futureBucket.sort((a,b)=>a.k-b.k);
  const next5 = futureBucket.slice(0,5);
  const showToday = [...liveNow,...todayBucket].sort((a,b)=>a.k-b.k);

  if(!showToday.length && !next5.length) return '';

  let h=`<div style="margin-bottom:16px">
    <div class="sec-title" style="margin-bottom:10px">
      ${liveNow.length?'🔴 En curso · ':''}📅 Hoy${showToday.length?'':' · próximos partidos'}
    </div>`;

  // ── TODAY / LIVE ─────────────────────────────────────────
  showToday.forEach(({m,mi})=>{
    const isL=liveNow.some(l=>l.mi===mi);
    const pc=S.players.filter((_,pi)=>{const p=S.pred[`${mi}_${pi}`];return p&&p.h!==undefined;}).length;
    h+=`<div onclick="go('partidos')" style="cursor:pointer;background:var(--card);
      border:1.5px solid ${isL?'var(--red)':'var(--blue-border)'};
      border-radius:var(--r);padding:11px 14px;margin-bottom:8px;
      display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
      gap:8px;box-shadow:var(--sh)">
      <div style="text-align:center">
        <div style="font-size:20px">${fl(m.h)}</div>
        <div style="font-size:10px;font-weight:700;margin-top:2px;
          max-width:80px;white-space:nowrap;overflow:hidden;
          text-overflow:ellipsis;margin:2px auto 0">${m.h}</div>
      </div>
      <div style="text-align:center;min-width:70px">
        ${isL
          ? `<div style="display:inline-flex;align-items:center;gap:4px;background:var(--red);
              color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;margin-bottom:4px">
              <span style="width:4px;height:4px;border-radius:50%;background:#fff;
                animation:blink 1s infinite;display:inline-block"></span>EN VIVO</div>
             <div style="font-family:var(--fd);font-size:26px;color:var(--navy);line-height:1">– –</div>`
          : `<div style="font-size:11px;font-weight:700;color:var(--blue-text)">${matchLocalTime(m.d,m.t)}</div>
             <div style="font-size:9px;color:var(--faint);margin-top:2px">Grupo ${m.g} · ${pc}/${S.players.length}</div>`}
      </div>
      <div style="text-align:center">
        <div style="font-size:20px">${fl(m.a)}</div>
        <div style="font-size:10px;font-weight:700;margin-top:2px;
          max-width:80px;white-space:nowrap;overflow:hidden;
          text-overflow:ellipsis;margin:2px auto 0">${m.a}</div>
      </div>
    </div>`;
  });

  // ── NEXT 5 from future days (opaque) ─────────────────────
  if(next5.length){
    // Group by date label
    const byDate={};
    next5.forEach(({m,mi,k})=>{
      const dl=new Date(k).toLocaleDateString("es",{weekday:"long",day:"numeric",month:"long"});
      if(!byDate[dl])byDate[dl]=[];
      byDate[dl].push({m,mi});
    });
    Object.entries(byDate).forEach(([dl,ms],gi)=>{
      h+=`<div style="display:flex;align-items:center;gap:8px;
        margin:${gi===0&&showToday.length?'10px':'6px'} 0 6px">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span style="font-size:9px;font-weight:700;letter-spacing:.06em;
          text-transform:uppercase;color:var(--faint)">${dl}</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>`;
      ms.forEach(({m,mi})=>{
        const pc=S.players.filter((_,pi)=>{const p=S.pred[`${mi}_${pi}`];return p&&p.h!==undefined;}).length;
        h+=`<div style="background:var(--card);border:1px solid var(--border);
          border-radius:var(--r);padding:10px 14px;margin-bottom:6px;
          display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
          gap:8px;opacity:0.45;filter:grayscale(25%);box-shadow:var(--sh)">

  h+=`</div>`;
  return h;

function gW(id){return S.ko[id]?.winner||null;}
function gH(id){return S.ko[id]?.h||null;}
function gA(id){return S.ko[id]?.a||null;}

function bkTeam(name,score,win){
  return `<div class="bk-t${win?" win":""}${!name?" tbd":""}">
    <span class="bk-tf">${name?fl(name):""}</span>
    <span class="bk-tn${!name?" tbd":""}">${name||"TBD"}</span>
    <span class="bk-ts">${score!==undefined&&score!==null?score:""}</span>
  </div>`;
}
function bkMHtml(m){
  const r=S.ko[m.id]||{};
  const hW=r.winner&&r.winner===r.h,aW=r.winner&&r.winner===r.a;
  return `<div class="bk-m" onclick="${isAdmin?"openBkM('"+m.id+"')":"void(0)"}">
    <div class="bk-mi">${m.n} · ${m.d}</div>
    ${bkTeam(r.h,r.hScore,hW)}${bkTeam(r.a,r.aScore,aW)}
  </div>`;
}
function bkCol(ms,lbl){return`<div class="bk-col"><div class="bk-col-hdr">${lbl}</div><div class="bk-col-ms">${ms.map(m=>bkMHtml(m)).join("")}</div></div>`;}

function rBracket(){

  const fin=(byR.FIN||[])[0],tp=(byR["3P"]||[])[0];
  const champ=gW("final"),fa=gH("final"),fb=gA("final");
  const ta=gH("tp"),tb=gA("tp"),third=gW("tp");
  const center=`<div class="bk-center">
    <div class="bk-col-hdr">Gran Final</div>
    <div class="fin-tile"${isAdmin?` onclick="openBkM('final')"`:""}> 
      <div class="fin-trophy">🏆</div><div class="fin-lbl">GRAN FINAL</div><div class="fin-date">#104 · Jul 19</div>
      ${fa?`<div class="fin-tr${champ===fa?" champ":""}">${champ===fa?'<span class="crown">👑</span>':''}<span class="ftf">${fl(fa)}</span><span class="ftn">${fa}</span></div>`:`<div class="fin-tbd">TBD</div>`}
      <div class="fin-vs">vs</div>
      ${fb?`<div class="fin-tr${champ===fb?" champ":""}">${champ===fb?'<span class="crown">👑</span>':''}<span class="ftf">${fl(fb)}</span><span class="ftn">${fb}</span></div>`:`<div class="fin-tbd">TBD</div>`}
    </div>
    <div class="third-tile"${isAdmin?` onclick="openBkM('tp')"`:""}>
      <div class="third-lbl">3er Lugar · #103 · Jul 18</div>
      <div style="font-size:11px;margin-top:3px">${ta?fl(ta)+" "+ta:"TBD"} <span style="color:var(--faint)">vs</span> ${tb?fl(tb)+" "+tb:"TBD"}</div>
      ${third?`<div style="margin-top:3px;font-size:12px;font-weight:700">${fl(third)} ${third} 🥉</div>`:""}
    </div>
  </div>`;
  document.getElementById("p-bracket").innerHTML=`
  <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
    <div class="hint" style="flex:1;margin:0">${isAdmin?"Toca cualquier partido para ingresar equipos y resultado":"Solo el admin puede editar el bracket"}</div>
    <button class="btn btn-ghost btn-sm" onclick="pdfBracket()"><i class="ti ti-file-type-pdf"></i>Ver PDF</button>
  </div>

    ${center}
    ${bkCol(sf.slice(1,2),"Semis")}${bkCol(qf.slice(2,4),"Cuartos")}${bkCol(r16.slice(4,8),"Octavos")}${bkCol(r32.slice(8,16),"Ronda de 32")}
  </div></div>`;
}

      </div>
      <div class="modal-acts">
        <button class="btn btn-ghost btn-sm" onclick="clearBkM()"><i class="ti ti-trash"></i>Borrar</button>

function updBkF(){
  const hn=document.getElementById("bk-hn")?.value||"",an=document.getElementById("bk-an")?.value||"";
  const hf=document.getElementById("bk-hf"),af=document.getElementById("bk-af");
  const hn2=document.getElementById("bk-hn2"),an2=document.getElementById("bk-an2");
  const woh=document.getElementById("wo-h"),woa=document.getElementById("wo-a");
  if(hf)hf.textContent=fl(hn)||"🏳️";if(af)af.textContent=fl(an)||"🏳️";
  if(hn2)hn2.textContent=hn||"Local";if(an2)an2.textContent=an||"Visitante";
  if(woh)woh.innerHTML=fl(hn)+" "+(hn||"(equipo local)");
  if(woa)woa.innerHTML=fl(an)+" "+(an||"(equipo visitante)");
}
function selBkW(side){
  const hn=document.getElementById("bk-hn")?.value.trim()||"";
  const an=document.getElementById("bk-an")?.value.trim()||"";
  bkW=side==="h"?hn:an;hilightBkW();
}
function hilightBkW(){
  const hn=document.getElementById("bk-hn")?.value.trim()||"";
  const an=document.getElementById("bk-an")?.value.trim()||"";
  const h=document.getElementById("wo-h"),a=document.getElementById("wo-a");
  if(h){h.style.background=bkW===hn&&hn?"var(--blue-bg)":"";h.style.borderColor=bkW===hn&&hn?"var(--blue-border)":"var(--border)";}
  if(a){a.style.background=bkW===an&&an?"var(--blue-bg)":"";a.style.borderColor=bkW===an&&an?"var(--blue-border)":"var(--border)";}
}
function saveBkM(){
  const hn=document.getElementById("bk-hn")?.value.trim()||"";
  const an=document.getElementById("bk-an")?.value.trim()||"";
  const hs=document.getElementById("bk-hs")?.value;
  const as_=document.getElementById("bk-as")?.value;
  const hScore=hs!==""&&hs!==undefined?+hs:undefined;
  const aScore=as_!==""&&as_!==undefined?+as_:undefined;
  let winner=bkW;
  if(hScore!==undefined&&aScore!==undefined&&hScore!==aScore)winner=hScore>aScore?hn:an;
  S.ko[bkMId]={h:hn,a:an,hScore,aScore,winner};
  save();closeModal();rBracket();toast("Resultado guardado ✓");
}
function clearBkM(){delete S.ko[bkMId];save();closeModal();rBracket();}

let activeP=0;
function rJugador(){
  if(!S.players.length){document.getElementById("p-jugador").innerHTML=`<div class="empty">No hay jugadores aún.</div>`;return;}
  if(activeP>=S.players.length)activeP=0;
  const T=totals(),ranked=[...T].sort((a,b)=>b-a);
  const rank=ranked.indexOf(T[activeP])+1,p=S.players[activeP];
  let rows="";
  GM_CHRONO.forEach(({m,mi})=>{
    const r=S.real[String(mi)],pr=S.pred[`${mi}_${activeP}`];
    const v=r&&pr?calcPts(r.h,r.a,pr.h,pr.a,false):null;
    const cls=v===null?"pt-n":v===0?"pt-0":v===3?"pt-3":v===5?"pt-5":"pt-7";
    rows+=`<tr>
      <td style="font-size:10px;color:var(--muted)">${m.n}</td>
      <td>${fl(m.h)} ${m.h}<br><span style="font-size:10px;color:var(--faint)">vs ${fl(m.a)} ${m.a}</span></td>
      <td class="tc">${r?r.h+"–"+r.a:"–"}</td>
      <td class="tc" style="color:var(--muted)">${pr&&pr.h!==undefined?pr.h+"–"+pr.a:"–"}</td>
      <td class="tc"><span class="ptag ${cls}">${v!==null?v+"p":"–"}</span></td>
    </tr>`;
  });
  document.getElementById("p-jugador").innerHTML=`
  <div class="p-select">${S.players.map((pl,i)=>`
    <button class="p-btn${i===activeP?" on":""}" onclick="setP(${i})">
      <span class="pav" style="background:${AVC[i%AVC.length]}">${ini(pl.name)}</span>
      ${pl.name}
    </button>`).join("")}
  </div>
  <div class="p-hero">
    <div class="p-hero-av" style="background:${AVC[activeP%AVC.length]}">${ini(p.name)}</div>
    <div><div class="p-hero-name">${p.name}</div>
      <div class="p-hero-meta">Posición ${rank} de ${S.players.length} · ${p.paid?"✓ Pagó":"⚠ Pendiente"}</div>
    </div>
    <div style="margin-left:auto;text-align:right">
      <div class="p-hero-pts">${T[activeP]}</div><div class="p-hero-pl">PUNTOS</div>
    </div>
  </div>
  <div style="margin-bottom:12px">
    <button class="btn btn-navy btn-sm" onclick="pdfJugador(${activeP})"><i class="ti ti-file-type-pdf"></i>Ver PDF del jugador</button>
  </div>
  <div class="p-tbl-wrap">
    <table class="p-tbl">
      <thead><tr><th style="width:40px">#</th><th>Encuentro</th><th style="text-align:center;width:52px">Real</th><th style="text-align:center;width:52px">Pred.</th><th style="text-align:center;width:40px">Pts</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}
function setP(i){activeP=i;rJugador();}

function addPlayer(){
  const n=document.getElementById("new-name")?.value.trim();
  const paid=document.getElementById("new-paid")?.checked||false;
  if(!n){toast("Ingresa un nombre","err");return;}
  S.players.push({name:n,paid});
  // Re-sort alphabetically after adding
  S.players.sort((a,b)=>{
    const norm=s=>s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
    return norm(a.name).localeCompare(norm(b.name));
  });
  save();rRegistro();toast(n+" inscrito ✓");
}
function sendJoinRequest(){
  const n=document.getElementById("req-name")?.value.trim();
  const fb=document.getElementById("req-feedback");
  if(!n){if(fb)fb.textContent="Por favor escribe tu nombre completo.";return;}
  // Store pending request locally so admin sees it
  if(!S.pendingRequests)S.pendingRequests=[];
  if(S.pendingRequests.includes(n)){if(fb)fb.textContent="Ya enviaste una solicitud con ese nombre.";return;}
  S.pendingRequests.push(n);save();
  if(fb)fb.innerHTML='✓ Solicitud enviada. <strong style="color:var(--gold2)">'+n+'</strong> — el administrador te confirmará la inscripción.';
  if(document.getElementById("req-name"))document.getElementById("req-name").value="";
}
function approveRequest(ri){
  if(!S.pendingRequests)return;
  const name=S.pendingRequests[ri];
  S.players.push({name,paid:false});
  S.pendingRequests.splice(ri,1);
  save();rRegistro();toast(name+" inscrito ✓");
}
function rejectRequest(ri){
  if(!S.pendingRequests)return;
  S.pendingRequests.splice(ri,1);
  save();rRegistro();toast("Solicitud rechazada");
}
function delPlayer(i){
  if(!confirm(`¿Eliminar a ${S.players[i].name}? Sus pronósticos se borrarán.`))return;
  S.players.splice(i,1);
  const np={};Object.keys(S.pred).forEach(k=>{
    const[mi,pi]=k.split("_").map(Number);
    if(pi<i)np[k]=S.pred[k];else if(pi>i)np[`${mi}_${pi-1}`]=S.pred[k];
  });
  S.pred=np;save();rRegistro();toast("Jugador eliminado");
}
function togglePaid(i){S.players[i].paid=!S.players[i].paid;save();rRegistro();}

function togglePredRow(pi){
  const form = document.getElementById(`pred-form-${pi}`);
  if(!form)return;
  const open = form.style.display !== "none";
  // Close all others first
  S.players.forEach((_,i)=>{
    const f=document.getElementById(`pred-form-${i}`);
    if(f)f.style.display="none";
  });
  if(!open){
    form.style.display="block";
    document.getElementById(`ph-${pi}`)?.focus();
  }
}

function savePred(mi,pi){
  const h = document.getElementById(`ph-${pi}`)?.value;
  const a = document.getElementById(`pa-${pi}`)?.value;
  if(h===""||a===""||h===undefined||a===undefined){
    toast("Ingresa los dos goles","err");return;
  }
  S.pred[`${mi}_${pi}`]={h:+h,a:+a};
  save();
  toast(`✓ Pronóstico de ${S.players[pi].name} guardado`);
  renderPlanillaForm();
}

function clearPred(mi,pi){
  delete S.pred[`${mi}_${pi}`];
  save();
  renderPlanillaForm();
}
function applyPredJSON(){
  const txt=document.getElementById("pred-json")?.value.trim();
  if(!txt){toast("Pega el JSON primero","err");return;}
  try{applyPreds(JSON.parse(txt));}catch(e){toast("JSON inválido: "+e.message,"err");}
}
function loadPredFile(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{try{applyPreds(JSON.parse(e.target.result));}catch(err){toast("Error al leer archivo","err");}};r.readAsText(f);
}
function applyPreds(data){
  if(data.matchIndex===undefined||!data.predictions){toast("Formato inválido","err");return;}
  const mi=data.matchIndex;let count=0;
  data.predictions.forEach(p=>{
    if(p.h!==null&&p.h!==undefined&&p.a!==null&&p.a!==undefined){
      S.pred[`${mi}_${p.playerIndex}`]={h:+p.h,a:+p.a};count++;
    }
  });
  save();toast(`✓ ${count} pronósticos cargados para ${data.matchNum||"partido "+mi}`);
  if(document.getElementById("pred-json"))document.getElementById("pred-json").value="";
}

function onReal(inp){
  if(!isAdmin)return;
  const mi=+inp.dataset.mi, mik=String(mi), side=inp.dataset.side;
  const val=inp.value===""?undefined:+inp.value;
  if(!S.real[mik])S.real[mik]={};
  if(val===undefined)delete S.real[mik][side];else S.real[mik][side]=val;
  if(S.real[mik].h===undefined&&S.real[mik].a===undefined)delete S.real[mik];
  S.real["0"]={h:2,a:0}; // always keep official results
  save();
  const active=document.querySelector(".panel.on");
  if(active){const tab=active.id.replace("p-","");RENDERS[tab]?.();}
}
function onPred(inp){
  if(!isAdmin)return;
  const mi=+inp.dataset.mi,pi=+inp.dataset.pi,side=inp.dataset.side,key=`${mi}_${pi}`;
  const val=inp.value===""?undefined:+inp.value;
  if(!S.pred[key])S.pred[key]={};
  if(val===undefined)delete S.pred[key][side];else S.pred[key][side]=val;
  if(S.pred[key]&&S.pred[key].h===undefined&&S.pred[key].a===undefined)delete S.pred[key];
  save();
  const r=S.real[String(mi)],pr=S.pred[key];
  if(r&&r.h!==undefined&&r.a!==undefined&&pr&&pr.h!==undefined&&pr.a!==undefined){
    const v=calcPts(r.h,r.a,pr.h,pr.a,false);
    const cls=v===0?"pt-0":v===3?"pt-3":v===5?"pt-5":"pt-7";
    const badge=inp.closest(".pi-inps")?.querySelector(".ptag");
    if(badge){badge.className="ptag "+cls;badge.textContent=v+"p";}
  }
}

function pdfPlanilla(){
  const mi = planMi, m = GM[mi];
  const r   = S.real[String(mi)] || {};
  const hasResult = r.h !== undefined && r.a !== undefined;
  const today = new Date().toLocaleDateString("es",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

  // ── Helpers ──────────────────────────────────────────────
  function ptStyle(v){
    if(v===null||v===undefined) return "background:#F5F3EE;color:#9CA3AF";
    if(v===0)  return "background:#FFF1F2;color:#BE123C";
    if(v===3)  return "background:#EFF6FF;color:#1D4ED8";
    if(v===5)  return "background:#F0FDF4;color:#15803D";
    if(v===7)  return "background:#FFFBEB;color:#92400E";
    if(v===10) return "background:#FDF2F8;color:#831843";
    return "background:#F5F3EE;color:#9CA3AF";
  }

  // ── Build rows — show actual predictions ─────────────────
  const half = Math.ceil(S.players.length / 2);
  let rows = '';
  for(let row=0; row<half; row++){
    const li = row, ri = row + half;
    const lp = S.players[li], rp = S.players[ri];
    const lpr = lp ? (S.pred[`${mi}_${li}`]||{}) : {};
    const rpr = rp ? (S.pred[`${mi}_${ri}`]||{}) : {};
    const lHas = lp && lpr.h !== undefined && lpr.a !== undefined;
    const rHas = rp && rpr.h !== undefined && rpr.a !== undefined;
    // Points if result known
    const lv = hasResult && lHas ? calcPts(r.h,r.a,lpr.h,lpr.a,false) : null;
    const rv = hasResult && rHas ? calcPts(r.h,r.a,rpr.h,rpr.a,false) : null;

    // Left cell prediction display
    const lPred = lp ? (lHas
      ? `<div style="display:inline-flex;align-items:center;gap:5px">
          <span style="font-size:15px;font-weight:700;color:#0D1B2A;min-width:18px;text-align:center">${lpr.h}</span>
          <span style="color:#9CA3AF;font-size:13px">–</span>
          <span style="font-size:15px;font-weight:700;color:#0D1B2A;min-width:18px;text-align:center">${lpr.a}</span>
         </div>`
      : `<span style="color:#D1D5DB;font-size:11px">sin pronóstico</span>`)
      : '';

    // Right cell prediction display
    const rPred = rp ? (rHas
      ? `<div style="display:inline-flex;align-items:center;gap:5px">
          <span style="font-size:15px;font-weight:700;color:#0D1B2A;min-width:18px;text-align:center">${rpr.h}</span>
          <span style="color:#9CA3AF;font-size:13px">–</span>
          <span style="font-size:15px;font-weight:700;color:#0D1B2A;min-width:18px;text-align:center">${rpr.a}</span>
         </div>`
      : `<span style="color:#D1D5DB;font-size:11px">sin pronóstico</span>`)
      : '';

    // Points badges
    const lPts = hasResult && lp
      ? `<span style="${ptStyle(lv)};padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700">${lv!==null?lv+'p':'–'}</span>`
      : '';
    const rPts = hasResult && rp
      ? `<span style="${ptStyle(rv)};padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700">${rv!==null?rv+'p':'–'}</span>`
      : '';

    const lAv = lp ? `<span class="pdf-av-s" style="background:${AVC[li%AVC.length]}">${ini(lp.name)}</span>` : '';
    const rAv = rp ? `<span class="pdf-av-s" style="background:${AVC[ri%AVC.length]}">${ini(rp.name)}</span>` : '';

    rows += `<tr>
      <td style="width:28px;font-size:10px;color:#888;text-align:center">${lp?li+1:''}</td>
      <td style="font-size:11px">${lAv}${lp?lp.name:''}</td>
      <td style="width:90px;text-align:center">${lPred}</td>
      <td style="width:40px;text-align:center">${lPts}</td>
      <td style="width:10px;background:#E5E2DA;padding:0"></td>
      <td style="width:28px;font-size:10px;color:#888;text-align:center">${rp?ri+1:''}</td>
      <td style="font-size:11px">${rAv}${rp?rp.name:''}</td>
      <td style="width:90px;text-align:center">${rPred}</td>
      <td style="width:40px;text-align:center">${rPts}</td>
    </tr>`;
  }

  // ── Count stats ───────────────────────────────────────────
  const totalWithPred = S.players.filter((_,pi)=>{
    const pr=S.pred[`${mi}_${pi}`];
    return pr && pr.h!==undefined && pr.a!==undefined;
  }).length;

  const resultRow = hasResult
    ? `<div style="background:#0D1B2A;border-radius:8px;padding:10px 16px;margin-bottom:14px;
        display:flex;align-items:center;justify-content:center;gap:16px">
        <span style="font-size:13px;font-weight:700;color:#fff">${m.h}</span>
        <span style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:#C9A843">${r.h} – ${r.a}</span>
        <span style="font-size:13px;font-weight:700;color:#fff">${m.a}</span>
        <span style="background:#16A34A;color:#fff;font-size:10px;font-weight:700;
          padding:3px 9px;border-radius:12px;margin-left:8px">✓ Resultado oficial</span>
      </div>`
    : `<div style="background:#FFF8E1;border:1px solid #FDE68A;border-radius:8px;
        padding:8px 14px;margin-bottom:14px;font-size:11px;color:#92400E;text-align:center">
        ⏳ Partido aún no jugado — ${totalWithPred} de ${S.players.length} pronósticos ingresados
      </div>`;

  const page = `<div class="pdf-pg">
    <div class="ph">
      <div>
        <div class="ph-ey">FIFA World Cup 2026 · Polla Mundial · Planilla oficial</div>
        <div class="ph-title">Partido ${m.n} · Grupo ${m.g}</div>

      </div>
      <div class="ph-right">
        <div class="ph-date">${m.d} · ${m.t} EST</div>
        <div class="ph-venue">${m.v} · ${m.city}</div>
      </div>
    </div>

    <div class="pdf-mhero">
      <div class="pdf-mh-team">
        <span class="pdf-mh-flag">${fl(m.h)}</span>
        <div class="pdf-mh-name">${m.h}</div>
        <div class="pdf-mh-grp">Grupo ${m.g} · Local</div>
      </div>
      <div class="pdf-mh-ctr">
        <span class="pdf-mh-vs">${hasResult ? r.h+' – '+r.a : 'VS'}</span>
        <div class="pdf-mh-time">${m.d} · ${m.t} EST</div>
      </div>
      <div class="pdf-mh-team">
        <span class="pdf-mh-flag">${fl(m.a)}</span>
        <div class="pdf-mh-name">${m.a}</div>
        <div class="pdf-mh-grp">Grupo ${m.g} · Visitante</div>
      </div>
    </div>

    ${resultRow}

    <table class="pdf-tbl" style="table-layout:fixed;width:100%">
      <thead><tr>
        <th style="width:28px;padding:8px 4px">#</th>
        <th style="text-align:left;padding-left:6px">Jugador</th>
        <th style="width:90px">${m.h} – ${m.a}</th>
        ${hasResult ? '<th style="width:40px">Pts</th>' : '<th style="width:40px"></th>'}
        <th style="width:10px;background:#1E3352;padding:0;border:none"></th>
        <th style="width:28px;padding:8px 4px">#</th>
        <th style="text-align:left;padding-left:6px">Jugador</th>
        <th style="width:90px">${m.h} – ${m.a}</th>
        ${hasResult ? '<th style="width:40px">Pts</th>' : '<th style="width:40px"></th>'}
      </tr></thead>

  pdfOpen(page, `Planilla ${m.n} · ${m.h} vs ${m.a}`);

function setBFilt(g){
  document.querySelectorAll("[id^='bfilt-']").forEach(b=>{
    b.classList.toggle("on", b.id==="bfilt-"+g);
  });
  document.querySelectorAll(".bm-card").forEach(card=>{
    if(g==="all") card.style.display="";
    else if(g==="pending") card.style.display=card.dataset.pending==="true"?"":"none";
    else card.style.display=card.dataset.group===g?"":"none";
  });
}

function saveMyPred(mi, pi){
  // Admin puede todo; jugador solo sus propios y dentro del plazo
  if(!isAdmin){
    if(!currentPlayer || currentPlayer.pi!==pi) return; // silencioso
    const _r=S.real[String(mi)];

      toast("⛔ Este partido ya se jugó","err"); return;
    }
    if(isMatchLocked(GM[mi])){
      toast("⏰ Cerrado — menos de 1 hora para el partido","err"); return;
    }
  }
  const h=document.getElementById(`mph-${mi}`)?.value;
  const a=document.getElementById(`mpa-${mi}`)?.value;
  if(h===''||h===undefined||a===''||a===undefined){
    toast("Ingresa los dos marcadores","err"); return;
  }
  const key=`${mi}_${pi}`;
  S.pred[key]={h:+h,a:+a};
  if(!S.predTs) S.predTs={};
  if(!S.predTs[key]) S.predTs[key]=new Date().toISOString();
  else if(isAdmin) S.predTs[key+'_ed']=true;
  if(currentPlayer&&currentPlayer.u&&S.creds&&S.creds[currentPlayer.u]){
    const _cr=S.creds[currentPlayer.u];
    if(!_cr.la)_cr.la=[];
    _cr.la.unshift({a:GM[mi].n+' '+GM[mi].h+' vs '+GM[mi].a+': '+h+'–'+a,t:new Date().toISOString()});
    _cr.la=_cr.la.slice(0,5);
    _cr.ll=new Date().toISOString();
  }
  save();
  toast(`✓ Pronóstico: ${GM[mi].h} ${+h}–${+a} ${GM[mi].a}`);
  rMiPredForm(document.getElementById("p-mipred"));
}

// Returns true if match is locked (10 min before kickoff or already played)
function isMatchLocked(m){
  if(!m.d || !m.t) return false;
  try{
    // Parse match date/time — format: "Jun 11", "15:00" EST
    const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    const [mon, day] = m.d.split(" ");
    const [hh, mm] = m.t.split(":");
    // EST = UTC-5, EDT = UTC-4 (summer, so UTC-4 during June-July)
    const utcH = parseInt(hh) + 4; // EDT offset
    const matchUTC = Date.UTC(2026, months[mon], parseInt(day), utcH, parseInt(mm), 0);
    const nowUTC = Date.now();
    const tenMin = 60 * 60 * 1000; // 1 hora antes del partido
    return nowUTC >= matchUTC - tenMin;
  }catch(e){ return false; }
}

//  MUNDIAL — Resultados de todos los partidos jugados
// ════════════════════════════════════════════════════════════
function rMundial(){
  const el = document.getElementById("p-mundial");
  if(!el) return;

  const EDT=4;
  const MO={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  function kms(m){
    try{
      const[mon,day]=m.d.split(" ");
      const[hh,mm]=m.t.split(":");
      return Date.UTC(2026,MO[mon],parseInt(day),parseInt(hh)+EDT,parseInt(mm));
    }catch(e){return Infinity;}
  }

  const now=Date.now();
  const todayStr=new Date().toDateString();

  // Get next 2 calendar days after today
  const d1=new Date(); d1.setDate(d1.getDate()+1);
  const d2=new Date(); d2.setDate(d2.getDate()+2);
  const day1Str=d1.toDateString();
  const day2Str=d2.toDateString();

  const played=[], todayMs=[], day1Ms=[], day2Ms=[];
  GM.forEach((m,mi)=>{
    const r=S.real[String(mi)];
    if(r&&r.h!==undefined&&r.a!==undefined){played.push({m,mi,r});return;}
    const k=kms(m);
    const ds=new Date(k).toDateString();
    if(ds===todayStr)      todayMs.push({m,mi,k});
    else if(ds===day1Str)  day1Ms.push({m,mi,k});
    else if(ds===day2Str)  day2Ms.push({m,mi,k});
  });
  // Sort each bucket chronologically
  [todayMs,day1Ms,day2Ms].forEach(b=>b.sort((a,b2)=>a.k-b2.k));

  let h=`
  <div class="hero" style="margin-bottom:16px">
    <div class="hero-ey">FIFA World Cup 2026</div>
    <div class="hero-t">CÓMO VA EL MUNDIAL</div>
    <div class="hero-s">${played.length} partido${played.length!==1?"s":""} jugado${played.length!==1?"s":""} · ${72-played.length} restantes en grupos</div>
  </div>`;

  // ── PLAYED results — chronological ───────────────────────
  if(played.length){
    played.forEach(({m,mi,r})=>{
      const hw=r.h>r.a,aw=r.a>r.h,draw=r.h===r.a;
      h+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--sh)">

        </div>
        <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:14px 16px">
          <div style="display:flex;flex-direction:column-reverse;align-items:center;gap:4px;text-align:center">
            <div style="font-size:12px;font-weight:${hw?900:600};color:${hw?'var(--navy)':'var(--text)'};max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.h}</div>
            <div style="font-size:28px;line-height:1">${fl(m.h)}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <div style="display:flex;align-items:center;gap:8px">
              <div style="position:relative;text-align:center;min-width:28px">
                ${hw?`<span style="position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:13px">⭐</span>`:''}
                <div style="font-family:var(--fd);font-size:40px;line-height:1;color:${hw?'var(--green)':draw?'var(--navy)':'var(--faint)'}">${r.h}</div>

          </div>
        </div>

            const nm=pl.name.split(" ")[0]+" "+(pl.name.split(" ")[1]?pl.name.split(" ")[1][0]+".":"");
            const pr=S.pred[`${mi}_${pi}`];
            if(!pr||pr.h===undefined) return `<span style="font-size:9px;color:var(--faint)">${nm} –</span>`;
            const v=calcPts(r.h,r.a,pr.h,pr.a,false);
            const bg=v===5?"var(--green-bg)":v===3?"var(--blue-bg)":v===0?"var(--red-bg)":"var(--off)";
            const col=v===5?"var(--green-text)":v===3?"var(--blue-text)":v===0?"var(--red-text)":"var(--faint)";

  } else {
    h+=`<div class="empty" style="padding:24px 20px 16px">

      <div style="font-size:12px;color:var(--muted)">Los partidos aparecen aquí cuando el admin ingresa el resultado.</div>
    </div>`;
  }

  // ── TODAY upcoming (in color, not yet played) ─────────────
  if(todayMs.length){
    h+=`<div class="phase-sep" style="margin-top:${played.length?'16px':'4px'}">
      <div class="phase-line"></div>
      <div class="phase-badge" style="color:var(--blue-text);border-color:var(--blue-border);background:var(--blue-bg)">📅 Hoy</div>

    todayMs.forEach(({m,mi})=>{

      h+=mundialUpcomingCard(m,mi,pc,false);

  // ── NEXT 2 DAYS opaque ────────────────────────────────────
  const opaqueGroups=[
    {label:d1.toLocaleDateString("es",{weekday:"long",day:"numeric",month:"long"}), matches:day1Ms},
    {label:d2.toLocaleDateString("es",{weekday:"long",day:"numeric",month:"long"}), matches:day2Ms},

  opaqueGroups.forEach(({label,matches},gi)=>{

      <div class="phase-badge" style="color:var(--faint);border-color:var(--border)">🔒 ${label}</div>

      const pc=S.players.filter((_,pi)=>{const p=S.pred[`${mi}_${pi}`];return p&&p.h!==undefined;}).length;
      h+=mundialUpcomingCard(m,mi,pc,true);
    });
  });

  el.innerHTML=h;
}

// ── PLAYER LOGIN SYSTEM ──────────────────
let currentPlayer = null;

function _h(s){
  let h=0;
  for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}
  return String(h>>>0);
}
function _un(name){
  const p=name.normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase().replace(/[^a-z0-9 ]/g,'').trim().split(/\s+/);
  return p.length>=2?p[0]+'.'+p[p.length-1]:p[0];
}
function _saveSess(u,pi){
  try{localStorage.setItem('pm26s',JSON.stringify(
    {u,pi,t:_h(u+pi+'26'),at:Date.now()}));}catch(e){}
}
function _loadSess(){
  try{
    const r=localStorage.getItem('pm26s');
    if(!r)return null;
    const s=JSON.parse(r);
    if(s.t!==_h(s.u+s.pi+'26'))return null;
    if(Date.now()-s.at>30*24*60*60*1000)return null;
    return s;
  }catch(e){return null;}
}
function _clearSess(){localStorage.removeItem('pm26s');currentPlayer=null;}

function _ensureCreds(){
  if(!S.creds)S.creds={};
  S.players.forEach((pl,pi)=>{
    const u=_un(pl.name);
    if(!S.creds[u]){
      // New user — create with default password
      S.creds[u]={pi,pw:_h('polla2026'),chg:true,ll:null};
    } else {
      // Existing user — fix missing fields (e.g. old Firebase data without pw)
      if(!S.creds[u].pw) S.creds[u].pw=_h('polla2026');
      if(S.creds[u].chg===undefined) S.creds[u].chg=true;
      if(S.creds[u].pi===undefined) S.creds[u].pi=pi;
    }
  });
}

  _ensureCreds();

        +'<div style="font-size:10px;color:var(--faint)">🕐 Última conexión: '+ll+'</div>'
        +(cr.la&&cr.la[0]?'<div style="font-size:10px;color:var(--faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px">📝 '+cr.la[0].a+'</div>':'')
      +'</div>'
      +'<button onclick="_resetPw(\''+u+'\',\''+pl.name+'\')" '
        +'style="font-size:11px;font-weight:700;padding:5px 10px;border-radius:var(--r-sm);'
        +'border:1.5px solid var(--amber-border);background:var(--amber-bg);'
        +'color:var(--amber-text);cursor:pointer;font-family:var(--fb)">'
        +'🔑 Resetear</button>'

  }).join('');
}

  if(!confirm('¿Resetear contraseña de '+name+'?\nVuelve a "polla2026"'))return;
  _ensureCreds();
  if(!S.creds[u])S.creds[u]={};
  S.creds[u].pw=_h('polla2026');S.creds[u].chg=true;
  save();
  const el=document.getElementById('_upanel');
  if(el)el.innerHTML=_uPanel();
  toast('✓ '+name+' → clave reseteada a "polla2026"');
}


function fmtTs(iso){
  if(!iso) return '';
  try{
    const d=new Date(iso);
    const wd=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][d.getDay()];
    const mo=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][d.getMonth()];
    const hh=d.getHours().toString().padStart(2,'0');
    const mm2=d.getMinutes().toString().padStart(2,'0');
    const tz=d.toLocaleTimeString([],{timeZoneName:'short'}).split(' ').pop();
    return wd+' '+d.getDate()+' '+mo+' '+hh+':'+mm2+' '+tz;
  }catch(e){return '';}
}
